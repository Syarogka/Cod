      - name: Download images
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError
          import json, time, zipfile, sys

          items = json.loads(Path('missing_orna_images.json').read_text(encoding='utf-8'))
          out_dir = Path('downloaded_missing_orna_images')
          out_dir.mkdir(exist_ok=True)
          ok = []
          failed = []
          headers = {'User-Agent': 'Mozilla/5.0 (compatible; OrnaCodexMirror/1.0)'}

          def download(url, out_path, retries=3):
              out_path.parent.mkdir(parents=True, exist_ok=True)
              if out_path.exists() and out_path.stat().st_size > 0:
                  return True
              last_error = ''
              for attempt in range(1, retries + 1):
                  try:
                      req = Request(url, headers=headers)
                      with urlopen(req, timeout=30) as response:
                          data = response.read()
                      if not data:
                          last_error = 'empty response'
                          time.sleep(1.5 * attempt)
                          continue
                      out_path.write_bytes(data)
                      return True
                  except Exception as e:
                      last_error = str(e)
                      time.sleep(1.5 * attempt)
              print(f'FAILED: {url} -> {last_error}')
              return False

          total = len(items)
          print(f'Total images: {total}')
          for i, item in enumerate(items, 1):
              url = item['url']
              rel = item['path'].lstrip('/').replace('\\', '/')
              print(f'[{i}/{total}] {rel}')
              if download(url, out_dir / rel):
                  ok.append(rel)
              else:
                  failed.append(url)

          Path('downloaded_ok.txt').write_text('\n'.join(ok) + ('\n' if ok else ''), encoding='utf-8')
          Path('downloaded_failed.txt').write_text('\n'.join(failed) + ('\n' if failed else ''), encoding='utf-8')

          zip_path = Path('orna_missing_images_downloaded.zip')
          if zip_path.exists():
              zip_path.unlink()
          with zipfile.ZipFile(zip_path, 'w', compression=zipfile.ZIP_DEFLATED) as z:
              for p in out_dir.rglob('*'):
                  if p.is_file():
                      z.write(p, p.relative_to(out_dir))
              z.write('downloaded_ok.txt')
              z.write('downloaded_failed.txt')

          print(f'Downloaded: {len(ok)}')
          print(f'Failed: {len(failed)}')
          print(f'Created: {zip_path}')
          PY

      - name: Upload result ZIP
        uses: actions/upload-artifact@v4
        with:
          name: orna_missing_images_downloaded
          path: orna_missing_images_downloaded.zip
          if-no-files-found: error
