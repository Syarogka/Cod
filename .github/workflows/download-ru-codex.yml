name: Download Russian Orna Codex

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 tqdm

      - name: Run downloader
        run: |
          python download_orna_ru.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: orna_codex_ru_database
          path: orna_codex_ru_database.zip
